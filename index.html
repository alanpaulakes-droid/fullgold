<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FullGold · Tus finanzas, bajo control</title>
<meta name="description" content="Ingresos, gastos, cuentas, deudas, cuotas y simulaciones. 100% en tu dispositivo.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FullGold">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap">
<style>
/* =====================================================================
   FullGold — sistema de tokens (Dark Luxe / Gold)
   ===================================================================== */
:root{
  color-scheme:dark;
  --gold:#e8b923; --gold-2:#ffd75e; --gold-ink:#1a1509;
  --bg:#09090b;
  --glow-1:rgba(232,185,35,.10);
  --glow-2:rgba(120,80,10,.10);
  --surface:rgba(255,255,255,.05);
  --surface-2:rgba(255,255,255,.09);
  --surface-solid:#141310;
  --border:rgba(232,185,35,.15);
  --border-soft:rgba(255,255,255,.09);
  --text:#f4f1e8; --muted:#9b9483;
  --green:#3ad39b; --green-soft:rgba(58,211,155,.14);
  --red:#ff6b74;   --red-soft:rgba(255,107,116,.14);
  --amber:#f5b544; --amber-soft:rgba(245,181,68,.14);
  --blue:#6cb0f5;  --blue-soft:rgba(108,176,245,.14);
  --gold-soft:rgba(232,185,35,.13);
  --sh-1:0 1px 2px rgba(0,0,0,.4);
  --sh-2:0 8px 24px rgba(0,0,0,.45);
  --sh-3:0 16px 48px rgba(0,0,0,.55);
  --r-sm:12px; --r-md:16px; --r-lg:22px; --r-full:999px;
  --t:200ms cubic-bezier(.4,0,.2,1);
  --display:"Space Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
:root[data-theme="light"]{
  color-scheme:light;
  --gold:#9a7100; --gold-2:#c9970a; --gold-ink:#fffaea;
  --bg:#f6f4ee;
  --glow-1:rgba(232,185,35,.22);
  --glow-2:rgba(201,151,10,.10);
  --surface:rgba(255,255,255,.8);
  --surface-2:rgba(20,16,8,.05);
  --surface-solid:#ffffff;
  --border:rgba(20,16,8,.10);
  --border-soft:rgba(20,16,8,.07);
  --text:#17140d; --muted:#726c5c;
  --green:#0f8f5c; --green-soft:rgba(15,143,92,.10);
  --red:#c9333f;   --red-soft:rgba(201,51,63,.10);
  --amber:#a86d00; --amber-soft:rgba(168,109,0,.10);
  --blue:#1e6fc4;  --blue-soft:rgba(30,111,196,.10);
  --gold-soft:rgba(154,113,0,.11);
  --sh-1:0 1px 2px rgba(30,25,5,.06);
  --sh-2:0 4px 10px rgba(30,25,5,.06),0 12px 32px rgba(30,25,5,.07);
  --sh-3:0 16px 48px rgba(30,25,5,.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html{min-height:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100dvh;background:var(--bg);color:var(--text);
  font:15px/1.55 var(--body);-webkit-font-smoothing:antialiased;
  -webkit-overflow-scrolling:touch;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(65% 45% at 50% -8%, var(--glow-1), transparent 70%),
    radial-gradient(55% 40% at 105% 105%, var(--glow-2), transparent 70%);
}
img,svg{display:block;max-width:100%}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
input,select,textarea{font-size:16px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
.hidden{display:none!important}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:40;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;gap:10px;
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border-soft);
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:34px;height:34px;border-radius:10px;flex:none;box-shadow:0 0 0 1px var(--border),0 4px 14px rgba(232,185,35,.22)}
.brand-name{font:700 19px/1 var(--display);letter-spacing:-.4px;white-space:nowrap}
.brand-name span{color:var(--gold)}
.sp{flex:1}
.icon-btn{
  width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:16px;
  background:var(--surface-2);border:1px solid var(--border-soft);transition:transform var(--t);
}
.icon-btn:active{transform:scale(.92)}

main{max-width:640px;margin:0 auto;padding:16px 16px calc(180px + env(safe-area-inset-bottom))}
.view{animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

h2.title{font:700 clamp(21px,5vw,26px)/1.15 var(--display);letter-spacing:-.6px}
.sub{color:var(--muted);font-size:13.5px;margin:3px 0 18px}

/* ---------- Card ---------- */
.card{
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--r-lg);box-shadow:var(--sh-2);padding:16px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.card+.card{margin-top:12px}

/* ---------- Hero ---------- */
.hero{
  position:relative;overflow:hidden;border:1px solid var(--border);
  background:linear-gradient(150deg,#1b1810 0%,#241f13 45%,#100e09 100%);
  color:#f7f3e6;box-shadow:var(--sh-3);
}
:root[data-theme="light"] .hero{
  background:linear-gradient(150deg,#1d1a12 0%,#2b2416 50%,#141109 100%);
}
.hero::after{
  content:"";position:absolute;right:-60px;top:-70px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(232,185,35,.4),transparent 68%);pointer-events:none;
}
.hero .lbl{font-size:11.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#cfc5a4}
.hero .big{font:700 clamp(32px,9vw,42px)/1 var(--display);letter-spacing:-1.6px;margin:6px 0 2px;color:#ffe9a8}
.hero .big.neg{color:#ff9ea6}
.hero .meter{height:6px;background:rgba(255,255,255,.12);border-radius:var(--r-full);overflow:hidden;margin:16px 0 10px}
.hero .meter>i{display:block;height:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--gold-2),#ff9d4d);transition:width var(--t)}
.hero .lines{display:grid;gap:7px}
.hero .ln{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;color:#d8d0b4}
.hero .ln b{font:700 15px var(--display);color:#f7f3e6}
.hero .ln.hi b{font-size:19px;color:#7ff0bf}
.hero .ln.hi b.neg{color:#ff9ea6}
.hero .row{display:flex;gap:8px;margin-top:14px}
.hero .pill{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-sm);padding:9px 11px}
.hero .pill .k{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#bdb495}
.hero .pill .v{font:700 15px var(--display);margin-top:2px}
.hero .pill .v.up{color:#7ff0bf} .hero .pill .v.down{color:#ff9ea6}

/* ---------- Stats ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--r-md);
  padding:12px 13px;box-shadow:var(--sh-1);
}
.stat .k{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
.stat .v{font:700 18px/1.2 var(--display);letter-spacing:-.5px;margin-top:5px}
.stat .v.green{color:var(--green)} .stat .v.red{color:var(--red)}
.stat .v.gold{color:var(--gold)}  .stat .v.blue{color:var(--blue)}

.section-h{display:flex;align-items:center;justify-content:space-between;margin:24px 2px 10px}
.section-h h3{font:700 16px var(--display);letter-spacing:-.2px}
.section-h .link{color:var(--gold);font-size:13px;font-weight:700;padding:6px 2px}

/* ---------- Items ---------- */
.item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-soft)}
.item:first-child{padding-top:2px}
.item:last-child{border-bottom:none;padding-bottom:2px}
.ico{
  width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex:none;
  background:var(--surface-2);border:1px solid var(--border-soft);
}
.item .m{flex:1;min-width:0}
.item .m .t{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .m .s{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .amt{font:700 15px var(--display);white-space:nowrap;letter-spacing:-.3px}
.amt.green{color:var(--green)} .amt.red{color:var(--red)}
.item .del{color:var(--muted);font-size:14px;padding:8px;opacity:.55;min-width:34px}
.item .del:active{opacity:1}
.row-actions{flex-basis:100%;display:flex;gap:8px;margin-top:10px}

.empty{text-align:center;color:var(--muted);padding:28px 12px;font-size:13.5px}
.empty .e{font-size:34px;display:block;margin-bottom:10px;opacity:.75}
.empty b{display:block;color:var(--text);font-size:14.5px;margin-bottom:3px}

.progress{height:6px;background:var(--surface-2);border-radius:var(--r-full);overflow:hidden;margin-top:9px;flex-basis:100%}
.progress>i{display:block;height:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--gold),var(--gold-2));transition:width var(--t)}
.progress.red>i{background:linear-gradient(90deg,#d64550,#ff6b74)}
.progress.green>i{background:linear-gradient(90deg,#0f8f5c,var(--green))}

.tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:7px;background:var(--surface-2);color:var(--muted);vertical-align:1px}
.tag.soon{background:var(--amber-soft);color:var(--amber)}
.tag.ok{background:var(--green-soft);color:var(--green)}
.tag.gold{background:var(--gold-soft);color:var(--gold)}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(135deg,var(--gold-2),var(--gold));color:var(--gold-ink);
  font:700 14.5px var(--display);padding:0 16px;min-height:46px;border-radius:14px;width:100%;
  transition:transform var(--t),filter var(--t);
}
:root[data-theme="light"] .btn{color:#fff8e3}
.btn:active{transform:scale(.97)}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border-soft)}
.btn.danger{background:var(--red-soft);color:var(--red);border:1px solid transparent}
.btn.sm{min-height:44px;font-size:13px;padding:0 12px}
.btn.icon{max-width:48px;flex:none}
.btn-row{display:flex;gap:10px;margin-top:18px}

/* ---------- Forms ---------- */
label.f{display:block;font-size:12.5px;font-weight:700;margin:16px 0 7px;color:var(--text)}
.field{
  width:100%;background:var(--surface-2);border:1px solid var(--border-soft);
  border-radius:12px;padding:12px 13px;outline:none;transition:border-color var(--t);
}
.field:focus{border-color:var(--gold)}
.seg{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:14px;border:1px solid var(--border-soft)}
.seg button{flex:1;min-height:40px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--muted);transition:var(--t)}
.seg button.on{background:var(--surface-solid);color:var(--text);box-shadow:var(--sh-1)}
.seg.type button.on.inc{color:var(--green)} .seg.type button.on.exp{color:var(--red)}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  padding:9px 12px;border-radius:11px;background:var(--surface-2);font-size:13px;font-weight:600;
  border:1px solid transparent;transition:var(--t);min-height:40px;display:flex;align-items:center;
}
.chip.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.hint{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.5}

/* ---------- Nav ---------- */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  background:color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border-soft);
}
nav.tabs button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;min-height:48px;
  color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.1px;transition:color var(--t);
}
nav.tabs button .ti{font-size:19px;line-height:1;transition:transform var(--t)}
nav.tabs button.on{color:var(--gold)}
nav.tabs button.on .ti{transform:translateY(-2px) scale(1.08)}

.fab{
  position:fixed;right:16px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:45;
  width:56px;height:56px;border-radius:18px;font-size:26px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--gold-2),var(--gold));color:var(--gold-ink);
  box-shadow:0 8px 26px rgba(201,151,0,.45);transition:transform var(--t);
}
.fab:active{transform:scale(.92)}

/* ---------- Sheet ---------- */
.backdrop{
  position:fixed;inset:0;background:rgba(6,5,2,.62);z-index:60;
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}
.sheet{
  background:var(--surface-solid);width:100%;max-width:640px;border:1px solid var(--border-soft);border-bottom:none;
  border-radius:24px 24px 0 0;padding:6px 18px calc(20px + env(safe-area-inset-bottom));
  max-height:92dvh;overflow-y:auto;animation:up .3s cubic-bezier(.2,.8,.2,1);box-shadow:var(--sh-3);
}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.grip{width:38px;height:4px;background:var(--border-soft);border-radius:var(--r-full);margin:8px auto 8px}
.sheet h3{font:700 19px var(--display);letter-spacing:-.3px;margin:4px 2px 0}
.sheet-sub{font-size:13px;color:var(--muted);margin:4px 2px 0}
.pay-amount{
  font:700 clamp(30px,8vw,36px)/1 var(--display);letter-spacing:-1.2px;color:var(--gold);
  text-align:center;padding:18px 0 16px;margin-top:12px;background:var(--gold-soft);border-radius:var(--r-md);
}

/* ---------- Aprende ---------- */
.advice{display:flex;gap:11px;align-items:flex-start;padding:13px;background:var(--gold-soft);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px}
.advice .em{font-size:21px;flex:none;line-height:1.2}
.advice .tx{font-size:13px;line-height:1.55}
.advice .tx b{display:block;margin-bottom:2px;font-size:14px;font-family:var(--display)}
.accordion{border:1px solid var(--border-soft);border-radius:var(--r-md);overflow:hidden;margin-bottom:9px;background:var(--surface)}
.accordion>summary{padding:14px;font-weight:700;font-size:14px;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:10px;min-height:48px}
.accordion>summary::-webkit-details-marker{display:none}
.accordion>summary::after{content:"+";color:var(--gold);font-size:19px;font-weight:400;flex:none}
.accordion[open]>summary::after{content:"–"}
.accordion .body{padding:0 14px 14px;font-size:13px;color:var(--text);line-height:1.6}
.accordion .body p{margin-bottom:8px}
.accordion .body ul{margin:0 0 8px 17px} .accordion .body li{margin-bottom:4px}

/* ---------- Simulador ---------- */
.simres{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:15px;margin-top:16px;animation:fade .25s}
.simres .verdict{font:700 16px var(--display);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.simres .verdict.good{color:var(--green)} .simres .verdict.warn{color:var(--amber)} .simres .verdict.bad{color:var(--red)}
.simrow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px dashed var(--border-soft);font-size:13.5px}
.simrow:last-of-type{border-bottom:none}
.simrow .v{font-weight:700;font-family:var(--display);white-space:nowrap}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.55}

.toast{
  position:fixed;bottom:calc(150px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--surface-solid);color:var(--text);border:1px solid var(--border);
  padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:80;box-shadow:var(--sh-3);
  animation:fade .2s;max-width:90vw;text-align:center;
}

/* ---------- Lock ---------- */
#lock{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
#lock .brand-mark{width:68px;height:68px;border-radius:20px}
#lock h1{font:700 21px var(--display);letter-spacing:-.4px}
#lock .dots{display:flex;gap:13px;margin:2px 0}
#lock .dots i{width:13px;height:13px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border-soft);transition:var(--t)}
#lock .dots i.on{background:var(--gold);border-color:var(--gold);transform:scale(1.12)}
#lock .pad{display:grid;grid-template-columns:repeat(3,70px);gap:14px}
#lock .pad button{height:70px;border-radius:50%;background:var(--surface);border:1px solid var(--border-soft);font:600 24px var(--display);box-shadow:var(--sh-1)}
#lock .pad button:active{background:var(--surface-2);transform:scale(.94)}
#lock .err{color:var(--red);font-size:12.5px;font-weight:600;height:16px}

@media (min-width:520px){ .stat-grid{grid-template-columns:repeat(4,1fr)} }
@media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation:none!important;transition:none!important} }
</style>
</head>
<body>

<!-- Sprite del logo (definido una vez, reutilizado con <use>) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="fgGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe488"/><stop offset=".45" stop-color="#e8b923"/><stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="fgTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a251b"/><stop offset="1" stop-color="#0b0a08"/>
    </linearGradient>
    <symbol id="fgLogo" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="115" fill="url(#fgTile)"/>
      <circle cx="256" cy="256" r="166" fill="url(#fgGold)"/>
      <circle cx="256" cy="256" r="142" fill="none" stroke="#8a6508" stroke-opacity=".3" stroke-width="7"/>
      <g fill="none" stroke="#191510" stroke-width="27" stroke-linecap="round" stroke-linejoin="round">
        <path d="M164 306 L227 244 L268 285 L348 206"/>
        <path d="M298 206 L348 206 L348 256"/>
      </g>
    </symbol>
  </defs>
</svg>

<!-- ============ LOCK ============ -->
<div id="lock" class="hidden">
  <svg class="brand-mark" viewBox="0 0 512 512" aria-label="FullGold" role="img"><use href="#fgLogo"/></svg>
  <h1>FullGold</h1>
  <div class="err" id="lockErr" role="alert"></div>
  <div class="dots" id="lockDots"><i></i><i></i><i></i><i></i></div>
  <div class="pad" id="lockPad"></div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header>
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 512 512" aria-hidden="true"><use href="#fgLogo"/></svg>
      <span class="brand-name">Full<span>Gold</span></span>
    </div>
    <div class="sp"></div>
    <button class="icon-btn" id="btnTheme" aria-label="Cambiar tema">🌙</button>
    <button class="icon-btn" id="btnSettings" aria-label="Ajustes">⚙️</button>
  </header>

  <main>
    <div id="view-home" class="view"></div>
    <div id="view-money" class="view hidden"></div>
    <div id="view-debt" class="view hidden"></div>
    <div id="view-sim" class="view hidden"></div>
    <div id="view-learn" class="view hidden"></div>
  </main>

  <button class="fab" id="fab" aria-label="Agregar movimiento">＋</button>

  <nav class="tabs" role="tablist">
    <button data-tab="home" class="on"><span class="ti" aria-hidden="true">🏠</span>Resumen</button>
    <button data-tab="money"><span class="ti" aria-hidden="true">💸</span>Movimientos</button>
    <button data-tab="debt"><span class="ti" aria-hidden="true">📋</span>Deudas</button>
    <button data-tab="sim"><span class="ti" aria-hidden="true">🎯</span>Simular</button>
    <button data-tab="learn"><span class="ti" aria-hidden="true">🎓</span>Aprende</button>
  </nav>
</div>

<div id="modalRoot"></div>

<script>
"use strict";
/* =====================================================================
   FullGold — finanzas personales 100% locales.
   Los datos viven solo en localStorage de este dispositivo:
   sin red, sin analítica, sin terceros.
   ===================================================================== */

const LS_KEY='fullgold.v1';
const $  = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];

/* ---------- Estado ---------- */
const DEFAULTS = () => ({
  settings:{ currency:'CLP', theme:'dark', pin:null, locale:'es-CL' },
  tx:[],        // {id,type:'income'|'expense',amount,cat,note,date,acct,ref:{k,id}}
  debts:[],     // {id,name,total,paid,rate,dueDay,monthly,lastPaid,acct}
  plans:[],     // {id,name,total,installments,paid,start,lastPaid,acct}
  fixed:[],     // {id,name,amount,dueDay,cat,lastPaid,acct}
  accounts:[],  // {id,name,type:'cash'|'debit'|'credit'|'saving',icon,limit,opening}
  goals:[]
});
const ARRAYS=['tx','debts','plans','fixed','accounts','goals'];

function load(){
  const base=DEFAULTS();
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return base;
    const p=JSON.parse(raw)||{};
    const s=Object.assign(base,p);
    s.settings=Object.assign(DEFAULTS().settings, p.settings||{});
    ARRAYS.forEach(k=>{ if(!Array.isArray(s[k])) s[k]=[]; });
    return s;
  }catch(e){ return DEFAULTS(); }
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }
  catch(e){ toast('No se pudo guardar en este navegador'); }
}
let S = load();
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ---------- Formato ---------- */
const CUR = {
  CLP:{sym:'$',dec:0}, USD:{sym:'US$',dec:2}, EUR:{sym:'€',dec:2},
  MXN:{sym:'$',dec:2}, ARS:{sym:'$',dec:2}, COP:{sym:'$',dec:0}, PEN:{sym:'S/',dec:2}
};
function fmt(n){
  const c=CUR[S.settings.currency]||CUR.CLP;
  const v=Math.round((+n||0)*100)/100;
  let s;
  try{ s=Math.abs(v).toLocaleString(S.settings.locale||'es-CL',{minimumFractionDigits:c.dec,maximumFractionDigits:c.dec}); }
  catch(e){ s=Math.abs(v).toFixed(c.dec); }
  return (v<0?'−':'')+c.sym+s;
}
const NOW = ()=>new Date();
function monthKey(d){ const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'); }
function thisMonth(){ return monthKey(NOW()); }
function todayISO(){ const d=NOW(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fdate(d){ try{ return new Date(d).toLocaleDateString(S.settings.locale||'es-CL',{day:'2-digit',month:'short'}); }catch(e){ return d; } }
function monthName(){ try{ return NOW().toLocaleDateString(S.settings.locale||'es-CL',{month:'long',year:'numeric'}); }catch(e){ return thisMonth(); } }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- Categorías ---------- */
const CATS = {
  income:[['💼','Sueldo'],['💰','Extra'],['🎁','Regalo'],['📈','Inversión'],['🔁','Reembolso'],['🧾','Venta']],
  expense:[['🍽️','Comida'],['🏠','Arriendo'],['⚡','Servicios'],['🚌','Transporte'],['🛒','Súper'],
           ['💊','Salud'],['🎮','Ocio'],['👕','Ropa'],['📚','Educación'],['💳','Cuotas'],
           ['📋','Deudas'],['📱','Suscripciones'],['🔧','Otros']]
};
function catIcon(type,name){ const l=(CATS[type]||[]).find(c=>c[1]===name); return l?l[0]:(type==='income'?'💰':'💸'); }

/* =====================================================================
   MODELO FINANCIERO — todo se deriva de los movimientos (S.tx).
   Pagar una cuota / abonar / pagar un fijo crea un movimiento real,
   así el dinero sale de la cuenta y se ve reflejado en todas las vistas.
   ===================================================================== */
const ACCT_TYPES = {
  cash:  {lbl:'Efectivo', em:'💵'},
  debit: {lbl:'Débito',   em:'💳'},
  credit:{lbl:'Crédito',  em:'🏦'},
  saving:{lbl:'Ahorro',   em:'🐷'}
};
const ACCT_ICONS = ['💵','💳','🏦','🐷','💰','🪙','🏧','👛','💼','📈'];

function acctById(id){ return S.accounts.find(a=>a.id===id); }
function assetAccounts(){ return S.accounts.filter(a=>a.type!=='credit'); }
function creditAccounts(){ return S.accounts.filter(a=>a.type==='credit'); }
function acctIncome(id){ return S.tx.reduce((a,t)=>a+(t.acct===id&&t.type==='income'? +t.amount:0),0); }
function acctExpense(id){ return S.tx.reduce((a,t)=>a+(t.acct===id&&t.type==='expense'? +t.amount:0),0); }
function acctUsed(a){ return Math.max(0, acctExpense(a.id)-acctIncome(a.id)); }        // deuda de la tarjeta
function acctAvail(a){ return (+a.limit||0)-acctUsed(a); }                              // cupo libre
function acctBalance(a){
  if(a.type==='credit') return acctAvail(a);
  return (+a.opening||0)+acctIncome(a.id)-acctExpense(a.id);
}
function acctLabel(id){ const a=id?acctById(id):null; return a? ' · '+(a.icon||'💳')+' '+esc(a.name) : ''; }

function sumTx(type,mk){
  return S.tx.reduce((a,t)=>a+((t.type===type&&(!mk||monthKey(t.date)===mk))? +t.amount:0),0);
}
/* Movimientos sin cuenta asignada: se cuentan igual, en su propia bolsa. */
function unassignedNet(){
  return S.tx.reduce((a,t)=> a + (t.acct? 0 : (t.type==='income'? +t.amount : -+t.amount)), 0);
}
/* Dinero realmente disponible ahora (cuentas de activo + lo no asignado). */
function disponibleTotal(){
  return assetAccounts().reduce((a,acc)=>a+acctBalance(acc),0) + unassignedNet();
}
function creditUsedTotal(){ return creditAccounts().reduce((a,acc)=>a+acctUsed(acc),0); }
function creditAvailTotal(){ return creditAccounts().reduce((a,acc)=>a+acctAvail(acc),0); }

/* --- Cuotas --- */
const planPer    = p => (+p.total)/(+p.installments||1);
const planActive = p => (+p.paid||0) < (+p.installments);
const planPaidThisMonth = p => p.lastPaid===thisMonth();
function plansRemaining(){ return S.plans.reduce((a,p)=>a+planPer(p)*Math.max(0,(+p.installments)-(+p.paid||0)),0); }
function monthlyInstallmentLoad(){ return S.plans.reduce((a,p)=> planActive(p)? a+planPer(p):a, 0); }
function pendingPlansTotal(){ return S.plans.reduce((a,p)=> (planActive(p)&&!planPaidThisMonth(p))? a+planPer(p):a, 0); }

/* --- Deudas --- */
const debtLeft = d => Math.max(0,(+d.total)-(+d.paid||0));
const debtActive = d => debtLeft(d)>0;
const debtPaidThisMonth = d => d.lastPaid===thisMonth();
function debtsRemainingTotal(){ return S.debts.reduce((a,d)=>a+debtLeft(d),0); }
function pendingDebtsTotal(){
  return S.debts.reduce((a,d)=> (debtActive(d)&&+d.monthly>0&&!debtPaidThisMonth(d))? a+Math.min(+d.monthly,debtLeft(d)):a, 0);
}

/* --- Gastos fijos --- */
const fixedIsPaid = f => f.lastPaid===thisMonth();
function monthlyFixedLoad(){ return S.fixed.reduce((a,f)=>a+ +f.amount,0); }
function pendingFixedTotal(){ return S.fixed.reduce((a,f)=> fixedIsPaid(f)? a : a+ +f.amount, 0); }

/* --- Los tres números que importan --- */
function compromisosPendientes(){ return pendingFixedTotal()+pendingPlansTotal()+pendingDebtsTotal(); }
function quedaDespues(){ return disponibleTotal()-compromisosPendientes(); }
function flujoMensualLibre(){
  const mk=thisMonth();
  return sumTx('income',mk)-sumTx('expense',mk)-compromisosPendientes();
}
function deudaTotalGlobal(){ return debtsRemainingTotal()+plansRemaining()+creditUsedTotal(); }

/* =====================================================================
   HOME
   ===================================================================== */
function renderHome(){
  const mk=thisMonth();
  const inc=sumTx('income',mk), exp=sumTx('expense',mk);
  const disp=disponibleTotal(), comp=compromisosPendientes(), queda=quedaDespues();
  const savRate = inc>0? Math.round((inc-exp)/inc*100) : 0;
  const pct = disp>0? Math.min(100,Math.round(comp/disp*100)) : (comp>0?100:0);
  const recent=[...S.tx].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const up=upcomingPayments();
  const adv=topAdvice();

  $('#view-home').innerHTML=`
    <div class="card hero">
      <div class="lbl">Disponible ahora</div>
      <div class="big num ${disp<0?'neg':''}">${fmt(disp)}</div>
      <div class="meter"><i style="width:${pct}%"></i></div>
      <div class="lines">
        <div class="ln"><span>Compromisos por pagar este mes</span><b class="num">−${fmt(comp)}</b></div>
        <div class="ln hi"><span>Te queda después de pagarlos</span><b class="num ${queda<0?'neg':''}">${fmt(queda)}</b></div>
      </div>
      <div class="row">
        <div class="pill"><div class="k">Ingresos mes</div><div class="v up num">${fmt(inc)}</div></div>
        <div class="pill"><div class="k">Gastos mes</div><div class="v down num">${fmt(exp)}</div></div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat"><div class="k">🐷 Tasa de ahorro</div><div class="v num ${savRate<0?'red':savRate<10?'gold':'green'}">${savRate}%</div></div>
      <div class="stat"><div class="k">📋 Deuda total</div><div class="v num ${deudaTotalGlobal()>0?'red':'green'}">${fmt(deudaTotalGlobal())}</div></div>
      <div class="stat"><div class="k">🏦 Cupo disponible</div><div class="v num blue">${fmt(creditAvailTotal())}</div></div>
      <div class="stat"><div class="k">📌 Compromiso al mes</div><div class="v num gold">${fmt(monthlyFixedLoad()+monthlyInstallmentLoad())}</div></div>
    </div>

    <div class="card" style="margin-top:12px;background:var(--gold-soft);border-color:var(--border)">
      <div class="advice" style="background:transparent;border:none;padding:0;margin:0">
        <div class="em">${adv.em}</div><div class="tx"><b>${adv.t}</b>${adv.d}</div>
      </div>
    </div>

    <div class="section-h"><h3>Mis cuentas</h3><span class="link" role="button" tabindex="0" onclick="openAcct()">+ Agregar</span></div>
    <div class="card">
      ${S.accounts.length? S.accounts.map(acctRow).join('')
        : emptyBox('💳','Sin cuentas todavía','Agrega tu sueldo, efectivo o tarjeta para ver desde dónde gastas')}
    </div>

    ${up.length?`
    <div class="section-h"><h3>Próximos pagos</h3><span class="tag gold">${up.length}</span></div>
    <div class="card">
      ${up.slice(0,5).map(u=>`
        <div class="item" style="flex-wrap:wrap">
          <div class="ico">${u.em}</div>
          <div class="m"><div class="t">${esc(u.name)}</div><div class="s">${u.when}</div></div>
          <div class="amt red num">${fmt(u.amount)}</div>
          <div class="row-actions">
            <button class="btn ghost sm" onclick="payFrom('${u.k}','${u.id}')">✓ Pagar ahora</button>
          </div>
        </div>`).join('')}
    </div>`:''}

    <div class="section-h"><h3>Movimientos recientes</h3><span class="link" role="button" tabindex="0" onclick="go('money')">Ver todo</span></div>
    <div class="card">
      ${recent.length? recent.map(txRow).join('') : emptyBox('🪙','Aún no registras movimientos','Toca ＋ para empezar')}
    </div>
  `;
}

function txRow(t){
  const ac=t.acct? acctById(t.acct):null;
  return `<div class="item">
    <div class="ico">${catIcon(t.type,t.cat)}</div>
    <div class="m"><div class="t">${esc(t.cat)}${t.note?' · '+esc(t.note):''}</div>
      <div class="s">${fdate(t.date)}${ac?' · '+(ac.icon||'💳')+' '+esc(ac.name):''}</div></div>
    <div class="amt num ${t.type==='income'?'green':'red'}">${t.type==='income'?'+':'−'}${fmt(t.amount)}</div>
    <button class="del" onclick="delTx('${t.id}')" aria-label="Eliminar movimiento">✕</button>
  </div>`;
}

function acctRow(a){
  const ty=ACCT_TYPES[a.type]||ACCT_TYPES.cash;
  const actions=`<div class="row-actions">
      <button class="btn ghost sm" onclick="openAcct('${a.id}')">✎ Editar</button>
      <button class="btn ghost sm icon" onclick="delAcct('${a.id}')" aria-label="Eliminar cuenta">🗑️</button>
    </div>`;
  if(a.type==='credit'){
    const usado=acctUsed(a), limit=+a.limit||0, disp=limit-usado;
    const pct= limit>0? Math.min(100,Math.round(usado/limit*100)) : 0;
    return `<div class="item" style="flex-wrap:wrap">
      <div class="ico">${a.icon||ty.em}</div>
      <div class="m"><div class="t">${esc(a.name)} <span class="tag">Crédito</span></div>
        <div class="s">Cupo ${fmt(limit)} · usado ${fmt(usado)} (${pct}%)</div></div>
      <div class="amt num ${disp<=0?'red':'green'}">${fmt(disp)}</div>
      <div class="progress ${pct>=80?'red':''}"><i style="width:${pct}%"></i></div>
      ${actions}
    </div>`;
  }
  const bal=acctBalance(a);
  return `<div class="item" style="flex-wrap:wrap">
    <div class="ico">${a.icon||ty.em}</div>
    <div class="m"><div class="t">${esc(a.name)} <span class="tag">${ty.lbl}</span></div>
      <div class="s">Saldo disponible${a.opening?' · inicial '+fmt(a.opening):''}</div></div>
    <div class="amt num ${bal<0?'red':''}">${fmt(bal)}</div>
    ${actions}
  </div>`;
}

function whenTxt(diff){ return diff===0?'Vence hoy':diff===1?'Vence mañana':'En '+diff+' días'; }
function daysTo(day){ const t=NOW().getDate(), d=+day||1; return d>=t? d-t : d-t+30; }

function upcomingPayments(){
  const list=[];
  S.fixed.forEach(f=>{
    if(fixedIsPaid(f)) return;
    const diff=daysTo(f.dueDay);
    list.push({k:'fixed',id:f.id,name:f.name,em:catIcon('expense',f.cat),amount:+f.amount,
      when:(f.dueDay?whenTxt(diff):'Gasto fijo del mes')+acctLabel(f.acct),sort:f.dueDay?diff:16});
  });
  S.plans.forEach(p=>{
    if(!planActive(p)||planPaidThisMonth(p)) return;
    list.push({k:'plan',id:p.id,name:p.name+' · cuota '+((+p.paid||0)+1)+'/'+p.installments,em:'💳',
      amount:planPer(p),when:'Cuota de este mes',sort:15});
  });
  S.debts.forEach(d=>{
    if(!debtActive(d)||debtPaidThisMonth(d)||!(+d.monthly>0)) return;
    const diff=daysTo(d.dueDay);
    list.push({k:'debt',id:d.id,name:d.name,em:'📋',amount:Math.min(+d.monthly,debtLeft(d)),
      when:(d.dueDay?whenTxt(diff):'Pago mensual')+acctLabel(d.acct),sort:d.dueDay?diff:17});
  });
  return list.sort((a,b)=>a.sort-b.sort);
}
function payFrom(k,id){ if(k==='fixed') openPayFixed(id); else if(k==='plan') openPayPlan(id); else openAbonar(id); }

/* =====================================================================
   MOVIMIENTOS
   ===================================================================== */
let moneyFilter='all', moneyAcct='all';
function renderMoney(){
  const mk=thisMonth();
  if(moneyAcct!=='all' && !acctById(moneyAcct)) moneyAcct='all';
  const list=[...S.tx].sort((a,b)=>new Date(b.date)-new Date(a.date))
    .filter(t=>moneyFilter==='all'||t.type===moneyFilter)
    .filter(t=>moneyAcct==='all'||t.acct===moneyAcct);

  const byCat={};
  S.tx.forEach(t=>{ if(t.type==='expense'&&monthKey(t.date)===mk&&(moneyAcct==='all'||t.acct===moneyAcct))
    byCat[t.cat]=(byCat[t.cat]||0)+ +t.amount; });
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCat=cats.length?cats[0][1]:1;
  const totCat=cats.reduce((a,c)=>a+c[1],0);

  $('#view-money').innerHTML=`
    <h2 class="title">Movimientos</h2>
    <div class="sub">${monthName()}${moneyAcct!=='all'?' · '+esc(acctById(moneyAcct).name):''}</div>

    ${S.accounts.length?`
    <div class="chips" style="margin-bottom:14px">
      <div class="chip ${moneyAcct==='all'?'on':''}" onclick="setMA('all')">Todas</div>
      ${S.accounts.map(a=>`<div class="chip ${moneyAcct===a.id?'on':''}" onclick="setMA('${a.id}')">${a.icon||'💳'} ${esc(a.name)}</div>`).join('')}
    </div>`:''}

    ${cats.length?`
    <div class="card">
      <div class="section-h" style="margin:0 0 12px"><h3>Gastos por categoría</h3><span class="tag">${fmt(totCat)}</span></div>
      ${cats.map(([c,v])=>`
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;gap:10px">
            <span>${catIcon('expense',c)} ${esc(c)}</span><span class="num">${fmt(v)} · ${Math.round(v/totCat*100)}%</span></div>
          <div class="progress"><i style="width:${Math.round(v/maxCat*100)}%"></i></div>
        </div>`).join('')}
    </div>`:''}

    <div class="seg" style="margin:14px 0">
      <button class="${moneyFilter==='all'?'on':''}" onclick="setMF('all')">Todo</button>
      <button class="${moneyFilter==='income'?'on inc':''}" onclick="setMF('income')">Ingresos</button>
      <button class="${moneyFilter==='expense'?'on exp':''}" onclick="setMF('expense')">Gastos</button>
    </div>

    <div class="card">
      ${list.length? list.map(txRow).join('') : emptyBox('🧾','Sin movimientos aquí','Cambia el filtro o toca ＋ para agregar')}
    </div>
  `;
}
function setMF(f){ moneyFilter=f; renderMoney(); }
function setMA(a){ moneyAcct=a; renderMoney(); }

/* =====================================================================
   DEUDAS · CUOTAS · GASTOS FIJOS
   ===================================================================== */
function renderDebt(){
  $('#view-debt').innerHTML=`
    <h2 class="title">Deudas y cuotas</h2>
    <div class="sub">Todo lo que debes, en un solo lugar</div>

    <div class="stat-grid" style="margin-top:0">
      <div class="stat"><div class="k">📋 Deuda total</div><div class="v num red">${fmt(deudaTotalGlobal())}</div></div>
      <div class="stat"><div class="k">💳 Cuotas al mes</div><div class="v num gold">${fmt(monthlyInstallmentLoad())}</div></div>
      <div class="stat"><div class="k">📌 Fijos al mes</div><div class="v num blue">${fmt(monthlyFixedLoad())}</div></div>
      <div class="stat"><div class="k">⏳ Falta pagar este mes</div><div class="v num ${compromisosPendientes()>0?'red':'green'}">${fmt(compromisosPendientes())}</div></div>
    </div>

    <div class="section-h"><h3>Gastos fijos mensuales</h3><span class="link" role="button" tabindex="0" onclick="openFixed()">+ Agregar</span></div>
    <div class="card">
      ${S.fixed.length? S.fixed.map(fixedRow).join('') : emptyBox('📌','Sin gastos fijos','Plan del celular, universidad, gimnasio…')}
    </div>

    <div class="section-h"><h3>Compras en cuotas</h3><span class="link" role="button" tabindex="0" onclick="openPlan()">+ Agregar</span></div>
    <div class="card">
      ${S.plans.length? S.plans.map(planRow).join('') : emptyBox('💳','Sin compras en cuotas','Registra tus pagos en 3, 6, 12 cuotas…')}
    </div>

    <div class="section-h"><h3>Otras deudas</h3><span class="link" role="button" tabindex="0" onclick="openDebt()">+ Agregar</span></div>
    <div class="card">
      ${S.debts.length? S.debts.map(debtRow).join('') : emptyBox('📋','Sin deudas registradas','Créditos, préstamos…')}
    </div>
  `;
}

function fixedRow(f){
  const paid=fixedIsPaid(f);
  return `<div class="item" style="flex-wrap:wrap">
    <div class="ico">${catIcon('expense',f.cat)}</div>
    <div class="m"><div class="t">${esc(f.name)} ${paid?'<span class="tag ok">Pagado</span>':'<span class="tag soon">Pendiente</span>'}</div>
      <div class="s">${fmt(f.amount)}/mes${f.dueDay?' · día '+f.dueDay:''}${acctLabel(f.acct)}</div></div>
    <div class="amt num ${paid?'green':'red'}">${fmt(f.amount)}</div>
    <div class="row-actions">
      ${paid?'':`<button class="btn ghost sm" onclick="openPayFixed('${f.id}')">✓ Pagar este mes</button>`}
      <button class="btn ghost sm icon" onclick="delFixed('${f.id}')" aria-label="Eliminar gasto fijo">🗑️</button>
    </div>
  </div>`;
}
function planRow(p){
  const per=planPer(p), paid=+p.paid||0, pct=Math.round(paid/(+p.installments)*100);
  const done=!planActive(p), mes=planPaidThisMonth(p);
  return `<div class="item" style="flex-wrap:wrap">
    <div class="ico">💳</div>
    <div class="m"><div class="t">${esc(p.name)} ${done?'<span class="tag ok">Pagado</span>':mes?'<span class="tag ok">Al día</span>':'<span class="tag soon">Cuota pendiente</span>'}</div>
      <div class="s">${fmt(per)}/mes · ${paid}/${p.installments} cuotas${acctLabel(p.acct)}</div></div>
    <div class="amt num">${fmt(per*Math.max(0,(+p.installments)-paid))}</div>
    <div class="progress ${done?'green':''}"><i style="width:${pct}%"></i></div>
    <div class="row-actions">
      ${done||mes?'':`<button class="btn ghost sm" onclick="openPayPlan('${p.id}')">✓ Pagar cuota</button>`}
      <button class="btn ghost sm icon" onclick="delPlan('${p.id}')" aria-label="Eliminar compra en cuotas">🗑️</button>
    </div>
  </div>`;
}

function simMode(m){
  simPay=m;
  $('#simCash').classList.toggle('on',m==='cash');
  $('#simInst').classList.toggle('on',m==='inst');
  $('#simInstBox').classList.toggle('hidden',m!=='inst');
  runSim();

function simLine(k,v,strong,color){
  return `<div class="simrow"><span>${k}</span><span class="v num" style="${strong?'font-size:16px;':''}${color?'color:'+color:''}">${v}</span></div>`;
}
function runSim(){
  const out=$('#simOut'); if(!out) return;
  const price=+($('#simPrice')?.value||0);
  if(!(price>0)){ out.innerHTML=''; return; }

  const queda=quedaDespues();          // lo que te queda tras pagar los compromisos
  const flujo=flujoMensualLibre();     // excedente del mes
  const comp=compromisosPendientes();
  let rows='', monthly=price, total=price, verdict, vclass, vem, extra='';

  if(simPay==='inst'){
    const n=Math.max(1,+($('#simN').value||1));
    const r=Math.max(0,+($('#simRate').value||0))/100;
    if(r>0){ monthly=price*r/(1-Math.pow(1+r,-n)); total=monthly*n; }
    else { monthly=price/n; total=price; }
    rows+=simLine('Cuota mensual',fmt(monthly),true);
    rows+=simLine('N° de cuotas',n+' meses');
    rows+=simLine('Total a pagar',fmt(total));
    if(total>price+0.5) rows+=simLine('Costo del crédito','+'+fmt(total-price),false,'var(--red)');
    rows+=simLine('Tu excedente libre del mes',fmt(flujo),false,flujo<0?'var(--red)':'var(--green)');
  } else {
    rows+=simLine('Pago único',fmt(price),true);
    rows+=simLine('Tienes disponible',fmt(disponibleTotal()));
    if(comp>0) rows+=simLine('Compromisos por pagar','−'+fmt(comp),false,'var(--amber)');
    rows+=simLine('Te quedaría después',fmt(queda-price),true,(queda-price)<0?'var(--red)':'var(--green)');
  }

  if(simPay==='cash'){
    if(price<=queda*0.5 && queda>0){ verdict='Te conviene'; vclass='good'; vem='😎';
      extra='Puedes pagarlo al contado y aún te queda colchón después de tus compromisos.'; }
    else if(price<=queda){ verdict='Con cuidado'; vclass='warn'; vem='🤔';
      extra='Alcanza, pero usarías gran parte de lo que te queda del mes. ¿Tienes fondo de emergencia?'; }
    else { verdict='No te conviene ahora'; vclass='bad'; vem='🛑';
      extra= queda<0 ? 'Tus compromisos ya superan tu dinero disponible. Primero ponte al día.'
                     : `Te faltan ${fmt(price-queda)} para pagarlo sin descuidar tus compromisos del mes.`; }
  } else {
    const ratio = flujo>0? monthly/flujo : 99;
    if(ratio<=0.15){ verdict='Te conviene'; vclass='good'; vem='😎';
      extra=`La cuota es solo el ${Math.round(ratio*100)}% de lo que te sobra cada mes.`; }
    else if(ratio<=0.35){ verdict='Manejable'; vclass='warn'; vem='🤔';
      extra=`La cuota toma el ${Math.round(ratio*100)}% de tu excedente mensual. Ajustado pero posible.`; }
    else { verdict='Riesgoso'; vclass='bad'; vem='🛑';
      extra= flujo<=0 ? 'Este mes tus compromisos se llevan todo lo que ganas: sumar una cuota te endeudaría más.'
                      : `La cuota se lleva el ${Math.round(ratio*100)}% de tu excedente. Demasiado apretado.`; }
    if(total>price*1.15) extra+=` Además pagarías ${fmt(total-price)} extra en intereses.`;
  }

  out.innerHTML=`<div class="simres">
    <div class="verdict ${vclass}">${vem} ${verdict}</div>
    ${rows}
    <p class="hint" style="margin-top:12px">${extra}</p>
  </div>`;
}

function dynamicAdvice(){
  const mk=thisMonth();
  const inc=sumTx('income',mk), exp=sumTx('expense',mk);
  const rate= inc>0? (inc-exp)/inc : 0;
  const comp=compromisosPendientes(), queda=quedaDespues(), disp=disponibleTotal();
  const fijos=monthlyFixedLoad(), cuotas=monthlyInstallmentLoad();
  const out=[];

  if(S.tx.length===0 && S.accounts.length===0){
    out.push({em:'👋',t:'¡Bienvenido a FullGold!',d:'Empieza creando tus cuentas (sueldo, efectivo, tarjeta) y registrando tu primer movimiento. Con unos días de datos te daré consejos hechos a tu medida.'});

    out.push({em:'💳',t:'Crea tus cuentas',d:'Agrega tu cuenta sueldo, tu efectivo y tus tarjetas. Así FullGold puede decirte desde dónde gastas y con cuánto quedas de verdad.'});

  } else if(comp>0 && disp>0 && comp/disp>0.6){

  }
  if(inc>0 && rate<0.1 && exp>0){
    out.push({em:'🐷',t:'Tu ahorro es muy bajo',d:`Ahorras el ${Math.round(rate*100)}% de tus ingresos. La meta sana es 20%. Aplica la regla 50/30/20: 50% necesidades, 30% gustos, 20% ahorro.`});
  } else if(rate>=0.2){

  }
  if(inc>0 && (fijos+cuotas)/inc>0.5){

  }
  creditAccounts().forEach(a=>{
    const lim=+a.limit||0;
    if(lim>0 && acctUsed(a)/lim>=0.8){
      out.push({em:'🏦',t:`${a.name} casi sin cupo`,d:`Llevas usado el ${Math.round(acctUsed(a)/lim*100)}% del cupo. Sobre 80% es zona de riesgo: bajarlo mejora tu salud financiera y tu historial.`});
    }
  });
  if(deudaTotalGlobal()>0){
    out.push({em:'⚔️',t:'Ataca tus deudas con estrategia',d:'Avalancha: paga primero la de mayor interés (ahorras más). Bola de nieve: paga la más pequeña primero (te motiva). Elige una y sé constante.'});
  }
  const GEN=[
    {em:'🐷',t:'Págate a ti primero',d:'Apenas recibas tu sueldo, aparta el ahorro antes de gastar. Lo que no ves, no lo gastas.'},
    {em:'🛟',t:'Fondo de emergencia',d:'Ten guardado el equivalente a 3–6 meses de tus gastos. Es tu escudo ante imprevistos sin caer en deudas.'},
    {em:'🧾',t:'Regla de las 24 horas',d:'Antes de una compra impulsiva, espera un día. Si al día siguiente sigues queriéndolo, cómpralo.'},
    {em:'📊',t:'Presupuesto 50/30/20',d:'50% necesidades, 30% deseos, 20% ahorro/deuda. Una guía simple para repartir tu sueldo.'}
  ];
  let i=0;
  while(out.length<4 && i<GEN.length) out.push(GEN[i++]);
  return out.slice(0,4);
}

/* Al borrar un movimiento generado por un pago, se revierte ese pago. */
function delTx(id){
  const t=S.tx.find(x=>x.id===id); if(!t) return;
  if(!confirm('¿Eliminar este movimiento?')) return;
  if(t.ref){
    if(t.ref.k==='plan'){ const p=S.plans.find(x=>x.id===t.ref.id); if(p){ p.paid=Math.max(0,(+p.paid||0)-1); p.lastPaid=null; } }
    if(t.ref.k==='debt'){ const d=S.debts.find(x=>x.id===t.ref.id); if(d){ d.paid=Math.max(0,(+d.paid||0)-(+t.amount)); d.lastPaid=null; } }
    if(t.ref.k==='fixed'){ const f=S.fixed.find(x=>x.id===t.ref.id); if(f){ f.lastPaid=null; } }
  }
  S.tx=S.tx.filter(x=>x.id!==id);
  save(); rerender(); toast(t.ref?'Movimiento y pago revertidos':'Movimiento eliminado');
}

  $('#acIcons').innerHTML=ACCT_ICONS.map(e=>`<div class="chip ${acctIconSel===e?'on':''}" onclick="pickAcctIcon('${e}')">${e}</div>`).join('');
}
function pickAcctIcon(e){ acctIconSel=e; renderAcctIcons(); }
function saveAcct(id){
  const name=$('#acName').value.trim();
  if(!name){ toast('Escribe un nombre'); return; }
  const type=$('#acType').value;
  const limit=parseFloat($('#acLimit')?.value)||0;
  const opening=parseFloat($('#acOpening')?.value)||0;
  if(type==='credit' && !(limit>0)){ toast('Ingresa el cupo de la tarjeta'); return; }
  const icon=acctIconSel||ACCT_TYPES[type].em;
  const a=id?acctById(id):null;
  if(a){ Object.assign(a,{name,type,limit,opening,icon}); }
  else { S.accounts.push({id:uid(),name,type,limit,opening,icon}); }
  save(); closeSheet(); rerender(); toast('Cuenta guardada ✓');
}
function delAcct(id){
  if(!confirm('¿Eliminar esta cuenta? Sus movimientos no se borran, quedan sin cuenta asignada.')) return;
  S.accounts=S.accounts.filter(a=>a.id!==id);
  S.tx.forEach(t=>{ if(t.acct===id) t.acct=null; });
  [...S.debts,...S.plans,...S.fixed].forEach(x=>{ if(x.acct===id) x.acct=null; });
  save(); rerender(); toast('Cuenta eliminada');
}

function delPlan(id){

}
function openPayPlan(id){
  const p=S.plans.find(x=>x.id===id); if(!p) return;
  if(!planActive(p)){ toast('Ya está pagada por completo'); return; }
  formAcct=defaultPayAcct();
  sheet(`
    <h3>Pagar cuota</h3>

      <button class="btn" onclick="confirmPayPlan('${p.id}')">Confirmar pago</button></div>
  `);

}
function confirmPayPlan(id){
  const p=S.plans.find(x=>x.id===id); if(!p||!planActive(p)) return;
  const n=(+p.paid||0)+1;
  S.tx.push({id:uid(),type:'expense',amount:planPer(p),cat:'Cuotas',
    note:p.name+' ('+n+'/'+p.installments+')',date:todayISO(),acct:formAcct,ref:{k:'plan',id:p.id}});
  p.paid=Math.min(+p.installments,n); p.lastPaid=thisMonth();
  save(); closeSheet(); rerender(); toast('Cuota pagada ✓');
}

function delFixed(id){

}
function openPayFixed(id){

  const d=S.debts.find(x=>x.id===id); if(!d||!debtActive(d)) return;

  const sug = +d.monthly>0? Math.min(+d.monthly,debtLeft(d)) : '';
  sheet(`

function confirmAbonar(id){

  const n=parseFloat($('#abAmt').value);
  if(!(n>0)){ toast('Ingresa un monto válido'); return; }
  const amt=Math.min(n,debtLeft(d));

    date:todayISO(),acct:formAcct,ref:{k:'debt',id:d.id}});
  d.paid=Math.min(+d.total,(+d.paid||0)+amt); d.lastPaid=thisMonth();

function fabAction(){ if(currentTab==='debt') openFixed(); else openTx(); }

/* =====================================================================
   AJUSTES
   ===================================================================== */
function openSettings(){
  sheet(`
    <h3>Ajustes</h3>
    <label class="f" for="setCur">Moneda</label>
    <select class="field" id="setCur">
      ${Object.keys(CUR).map(c=>`<option value="${c}" ${S.settings.currency===c?'selected':''}>${c} (${CUR[c].sym})</option>`).join('')}
    </select>
    <label class="f">Seguridad</label>
    <button class="btn ghost" onclick="togglePin()" style="justify-content:flex-start">
      🔒 ${S.settings.pin?'Cambiar o quitar PIN':'Proteger con PIN de 4 dígitos'}
    </button>
    <label class="f">Tus datos (privados, en este dispositivo)</label>
    <button class="btn ghost" onclick="exportData()">⬇️ Descargar copia de seguridad</button>
    <button class="btn ghost" style="margin-top:8px" onclick="document.getElementById('importFile').click()">⬆️ Restaurar copia</button>
    <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importData(event)">
    <button class="btn danger" style="margin-top:16px" onclick="wipe()">🗑️ Borrar todos mis datos</button>
    <p class="note" style="margin-top:16px">🔐 FullGold guarda todo <b>solo en este dispositivo</b>. No enviamos tus datos a ningún servidor ni a internet. Haz copias de seguridad de vez en cuando.</p>
    <div class="btn-row"><button class="btn" onclick="applySettings()">Listo</button></div>
  `);
}
function applySettings(){ S.settings.currency=$('#setCur').value; save(); closeSheet(); rerender(); toast('Ajustes guardados'); }

function exportData(){
  try{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='fullgold-backup-'+todayISO()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('Copia descargada ✓');
  }catch(e){ toast('No se pudo exportar'); }
}
function importData(ev){
  const file=ev.target.files&&ev.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d || !Array.isArray(d.tx)) throw new Error('formato');
      if(confirm('Esto reemplazará tus datos actuales. ¿Continuar?')){
        const base=DEFAULTS();
        S=Object.assign(base,d);
        S.settings=Object.assign(DEFAULTS().settings, d.settings||{});
        ARRAYS.forEach(k=>{ if(!Array.isArray(S[k])) S[k]=[]; });
        save(); closeSheet(); applyTheme(); rerender(); toast('Datos restaurados ✓');
      }
    }catch(e){ toast('Archivo no válido'); }
  };
  r.onerror=()=>toast('No se pudo leer el archivo');
  r.readAsText(file);
}
function wipe(){
  if(!confirm('¿Borrar TODOS tus datos de FullGold? Esto no se puede deshacer.')) return;
  if(!confirm('Última confirmación: se eliminará todo.')) return;
  S=DEFAULTS(); save(); closeSheet(); applyTheme(); rerender(); toast('Datos borrados');
}

/* =====================================================================
   PIN (capa de disuasión, no cifrado real)
   ===================================================================== */
function hashPin(p){ let h=5381; for(const c of ('fg'+p)) h=((h<<5)+h+c.charCodeAt(0))>>>0; return h.toString(36); }
function togglePin(){
  if(S.settings.pin && confirm('¿Quitar el PIN de seguridad?')){
    S.settings.pin=null; save(); toast('PIN eliminado'); openSettings(); return;
  }
  setNewPin();
}
function setNewPin(){
  const p=prompt('Escribe un PIN de 4 dígitos:');
  if(p===null) return;
  if(!/^\d{4}$/.test(p)){ toast('Debe ser 4 dígitos'); return; }
  if(prompt('Confirma el PIN:')!==p){ toast('No coincide'); return; }
  S.settings.pin=hashPin(p); save(); toast('PIN activado 🔒'); openSettings();
}
let lockBuf='';
function showLock(){
  $('#app').classList.add('hidden'); $('#lock').classList.remove('hidden');
  lockBuf=''; drawLockDots();
  $('#lockPad').innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
    k===''?'<span></span>':`<button onclick="lockKey('${k}')">${k}</button>`).join('');
}
function lockKey(k){
  $('#lockErr').textContent='';
  if(k==='⌫') lockBuf=lockBuf.slice(0,-1);
  else if(lockBuf.length<4) lockBuf+=k;
  drawLockDots();
  if(lockBuf.length===4){
    setTimeout(()=>{
      if(hashPin(lockBuf)===S.settings.pin){ $('#lock').classList.add('hidden'); $('#app').classList.remove('hidden'); }
      else { $('#lockErr').textContent='PIN incorrecto'; lockBuf=''; drawLockDots(); }
    },120);
  }
}
function drawLockDots(){ $$('#lockDots i').forEach((d,i)=>d.classList.toggle('on',i<lockBuf.length)); }

/* =====================================================================
   NAVEGACIÓN / UTILIDADES
   ===================================================================== */
let currentTab='home';
const RENDERERS={home:renderHome,money:renderMoney,debt:renderDebt,sim:renderSim,learn:renderLearn};
function go(tab){
  if(!RENDERERS[tab]) return;
  currentTab=tab;
  $$('.view').forEach(v=>v.classList.add('hidden'));
  $('#view-'+tab).classList.remove('hidden');
  $$('nav.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  RENDERERS[tab]();
  window.scrollTo(0,0);
}
function rerender(){ RENDERERS[currentTab](); }

let toastTimer=null;
function toast(msg){
  const old=$('.toast'); if(old) old.remove();
  const t=document.createElement('div');
  t.className='toast'; t.setAttribute('role','status'); t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),1900);
}
function emptyBox(e,t,s){
  return `<div class="empty"><span class="e">${e}</span><b>${t}</b>${s}</div>`;
}
function applyTheme(){
  const dark = S.settings.theme!=='light';
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  $('#btnTheme').textContent = dark?'☀️':'🌙';
  const m=$('meta[name=theme-color]'); if(m) m.setAttribute('content', dark?'#09090b':'#f6f4ee');
}

/* ---------- Init ---------- */
$$('nav.tabs button').forEach(b=>b.addEventListener('click',()=>go(b.dataset.tab)));
$('#fab').addEventListener('click',fabAction);
$('#btnSettings').addEventListener('click',openSettings);
$('#btnTheme').addEventListener('click',()=>{
  S.settings.theme = S.settings.theme==='light'?'dark':'light';
  save(); applyTheme();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

applyTheme();
if(S.settings.pin) showLock();
go('home');

/* Service worker: instalable y usable sin conexión (solo cachea archivos propios) */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
